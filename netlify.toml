[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# google-sync's 15-minute schedule is declared in-code (config.schedule in
# netlify/functions/google-sync.js) — the toml-only form failed to register.

[[redirects]]
  from = "/.netlify/functions/*"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
