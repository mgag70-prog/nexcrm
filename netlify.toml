[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Google sync runs every 15 minutes. Scheduled functions are invoked only by
# Netlify's scheduler — manual syncs go through google-sync-now.
[functions."google-sync"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/.netlify/functions/*"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
