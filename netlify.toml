[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# google-sync's 15-minute schedule is declared in-code (config.schedule in
# netlify/functions/google-sync.js) — the toml-only form failed to register.

# Functions resolve natively at /.netlify/functions/* — Netlify routes those
# before redirects, so no rule is needed (and a redirect whose path starts
# with /.netlify is rejected as invalid). Only the SPA catch-all remains.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
